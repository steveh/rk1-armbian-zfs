# Armbian compile.sh config for Turing RK1, Debian Trixie, ZFS-enabled.
# Invoked via:  ./compile.sh build rk1

BOARD="turing-rk1"
BRANCH="current"            # mainline LTS kernel; see README for vendor fallback
RELEASE="trixie"            # Debian 13
BUILD_MINIMAL="yes"         # server, no desktop
KERNEL_CONFIGURE="no"
INSTALL_HEADERS="yes"       # required by the zfs DKMS extension

# cloud-init  : drops user-data/meta-data/network-config into /boot
# rkbin-tools : Rockchip blobs for u-boot build
# zfs         : DKMS module + zfsutils-linux in image
ENABLE_EXTENSIONS="cloud-init,rkbin-tools,zfs"

# Networking: systemd-networkd is the minimal-image default; explicit for clarity.
NETWORKING_STACK="systemd-networkd"

# Compress output to .img.xz only (skip .7z etc.)
COMPRESS_OUTPUTIMAGE="sha,img,xz"
